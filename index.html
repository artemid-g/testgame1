<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Затерянный лабиринт</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-container">
        <h1>Затерянный лабиринт</h1>
        
        <div class="stats">
            <div>Здоровье: <span id="health">100</span></div>
            <div>Золото: <span id="gold">0</span></div>
            <div>Уровень: <span id="level">1</span></div>
            <div>Опыт: <span id="exp">0</span>/100</div>
        </div>

        <div id="gameBoard"></div>

        <div class="controls">
            <p>Управление: стрелки или WASD</p>
            <button id="restartButton">Новая игра</button>
        </div>

        <div id="messageLog">
            <p>Добро пожаловать в лабиринт! Найдите выход...</p>
        </div>
    </div>

    <script src="js/map.js"></script>
    <script src="js/player.js"></script>
    <script src="js/enemies.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
